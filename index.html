<html lang="pt-BR"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treino de Corrida</title>
  <meta name="theme-color" content="#cce5fb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Treino">
  <style>
    :root {
      --surface: #ffffff;
      --ink: #1b1f1d;
      --ink-soft: #8a9296;
      --line: #e8edee;

      --accent: #2fbf4f;

      --run-bg: #e7f7ea;   --run-ink: #1ea33f;
      --walk-bg: #e7f1fc;  --walk-ink: #2f86d6;
      --done-bg: #e7f7ea;  --done-ink: #1ea33f;

      --seg-aquece: #dfe5e7;
      --seg-caminha: #c4ccce;
      --seg-corre: #9aa4a6;

      --radius-lg: 30px;
      --radius-md: 18px;
      --shadow: 0 4px 22px rgba(40,60,80,.08), 0 1px 3px rgba(40,60,80,.05);
      --gap: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { overscroll-behavior: none; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: var(--ink);
      padding: 26px 20px 40px;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      background:
        radial-gradient(100% 70% at 15% 96%, rgba(120,225,180,.45), transparent 55%),
        radial-gradient(110% 70% at 52% 100%, rgba(255,205,150,.50), transparent 55%),
        radial-gradient(100% 70% at 88% 92%, rgba(255,170,210,.45), transparent 55%),
        linear-gradient(180deg, #c9e4fb 0%, #dfeefb 30%, #eef4f3 60%, #f6f3ee 100%);
      background-attachment: fixed;
    }

    header { text-align: center; margin-bottom: 24px; }
    h1 { font-size: 27px; font-weight: 800; letter-spacing: -0.6px; }
    .subtitulo { color: var(--ink-soft); font-size: 15px; margin-top: 6px; }

    .cartao {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 22px;
      margin-bottom: var(--gap);
      box-shadow: var(--shadow);
    }

    .rotulo {
      color: var(--ink-soft);
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
    }

    .destaque { font-size: 20px; font-weight: 700; margin-top: 6px; letter-spacing: -0.3px; }

    .acaoCartao { text-align: center; padding: 24px 22px; }
    .cronoLinha { display: flex; align-items: center; justify-content: center; gap: 6px; }
    .ringWrap { position: relative; width: 240px; height: 240px; flex: 0 0 auto; }
    .ring { width: 100%; height: 100%; transform: rotate(-90deg); }
    .ringSeg { fill: none; stroke-width: 14; }
    .ringProg {
      fill: none; stroke-width: 14; stroke-linecap: round; stroke: var(--walk-ink);
      transition: stroke-dashoffset .25s linear, stroke .3s ease;
    }
    .ringCenter {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .acaoTexto { font-size: 16px; font-weight: 800; letter-spacing: 0.3px; color: var(--walk-ink); }
    .tempoRestante {
      font-size: 50px; font-weight: 800; font-variant-numeric: tabular-nums;
      letter-spacing: -1.5px; margin-top: 2px; color: var(--ink);
    }
    .acaoCartao.corrida .acaoTexto { color: var(--run-ink); }
    .acaoCartao.corrida .ringProg { stroke: var(--run-ink); }
    .acaoCartao.caminhada .acaoTexto { color: var(--walk-ink); }
    .acaoCartao.caminhada .ringProg { stroke: var(--walk-ink); }
    .acaoCartao.concluida .acaoTexto { color: var(--done-ink); }
    .acaoCartao.concluida .ringProg { stroke: var(--done-ink); }

    .pular {
      flex: 0 0 auto; width: 38px; height: 38px; border-radius: 999px;
      background: #f1f5f6; color: var(--ink); border: none;
      font-size: 18px; font-weight: 700; cursor: pointer; line-height: 1;
    }
    .pular:disabled { opacity: 0.25; cursor: default; }

    #avisoTela { font-size: 12px; color: var(--ink-soft); margin-top: 14px; min-height: 16px; }

    .barra { background: #ecf0f1; border-radius: 999px; height: 8px; overflow: hidden; margin-top: 12px; }
    .barraPreenchida { background: var(--accent); height: 100%; width: 0%; border-radius: 999px; transition: width 0.25s linear; }

    .tempoTotalLinha {
      display: flex; justify-content: space-between; margin-top: 12px;
      font-size: 14px; color: var(--ink); font-variant-numeric: tabular-nums;
    }
    .tempoTotalLinha .faltam { color: var(--ink-soft); }

    .botoes { display: flex; gap: 12px; margin-bottom: var(--gap); }
    button {
      flex: 1; padding: 18px; font-size: 16px; font-weight: 700;
      border: none; border-radius: 999px; cursor: pointer;
      transition: transform .05s ease, opacity .2s ease;
    }
    button:active { transform: scale(0.98); }
    #btnIniciar { background: var(--ink); color: #fff; }
    #btnReiniciar { background: var(--surface); color: var(--ink); border: 1.5px solid var(--line); }
    #btnConcluir { background: var(--accent); color: #fff; display: none; }

    .navSessao { display: flex; align-items: center; justify-content: space-between; margin-top: 18px; gap: 10px; }
    .navSessao #planoProgresso { flex: 1; text-align: center; font-size: 13px; color: var(--ink-soft); }
    .navBtn {
      flex: 0 0 auto; padding: 9px 14px; font-size: 14px; font-weight: 700;
      background: #f1f5f6; color: var(--ink); border: none; border-radius: 999px; cursor: pointer;
    }
    .navBtn:disabled { opacity: 0.3; cursor: default; }

    .rodape { text-align: center; margin-top: 8px; }
    .linkBtn {
      background: none; color: var(--ink-soft); font-size: 13px; font-weight: 600;
      padding: 8px; text-decoration: underline; cursor: pointer;
    }

    ul { list-style: none; margin-top: 14px; }
    li {
      display: flex; justify-content: space-between;
      padding: 13px 16px; border-radius: var(--radius-md);
      margin-bottom: 8px; font-size: 15px; font-weight: 500;
    }
    li.corrida { background: var(--run-bg); color: var(--run-ink); }
    li.caminhada { background: var(--walk-bg); color: var(--walk-ink); }
    li.ativo { box-shadow: inset 0 0 0 2px var(--accent); }
    .tempo { font-weight: 700; }
  </style>
</head>
<body>

  <header>
    <h1>Treino de Corrida</h1>
    <p class="subtitulo">Do zero aos 30 minutos contínuos</p>
  </header>

  <div class="cartao">
    <div class="rotulo">Sessão atual</div>
    <div class="destaque" id="tituloSessao">Carregando...</div>
    <div class="navSessao">
      <button id="btnAnterior" class="navBtn">‹ Anterior</button>
      <span id="planoProgresso">0 de 42 concluídas</span>
      <button id="btnProxima" class="navBtn">Próxima ›</button>
    </div>
  </div>

  <div class="cartao acaoCartao" id="acaoCartao">
    <div class="cronoLinha">
      <button class="pular" id="btnPularAnt" title="Bloco anterior">‹</button>
      <div class="ringWrap">
        <svg class="ring" viewBox="0 0 240 240">
          <g id="ringSegmentos"></g>
          <circle class="ringProg" id="ringProg" cx="120" cy="120" r="110"></circle>
        </svg>
        <div class="ringCenter">
          <div class="acaoTexto" id="acaoTexto">Pronto?</div>
          <div class="tempoRestante" id="tempoRestante">00:00</div>
        </div>
      </div>
      <button class="pular" id="btnPularProx" title="Próximo bloco">›</button>
    </div>
    <div id="avisoTela"></div>
  </div>

  <div class="cartao">
    <div class="rotulo" id="progressoTexto">Bloco 0 de 0</div>
    <div class="barra"><div class="barraPreenchida" id="barraPreenchida"></div></div>
    <div class="tempoTotalLinha">
      <span id="tempoTotalDecorrido">00:00 / 00:00</span>
      <span class="faltam" id="tempoTotalRestante">faltam 00:00</span>
    </div>
  </div>

  <div class="botoes">
    <button id="btnIniciar">Iniciar</button>
    <button id="btnReiniciar">Reiniciar</button>
  </div>

  <div class="botoes">
    <button id="btnConcluir">Concluir sessão</button>
  </div>

  <div class="cartao">
    <div class="rotulo">Estrutura da sessão</div>
    <ul id="listaIntervalos"></ul>
  </div>

  <p class="rodape">
    <button id="btnZerar" class="linkBtn">Zerar progresso</button>
  </p>

  <script>
    // ====================================================================
    // 1. OS DADOS DO PLANO
    // ====================================================================
    const SEMANAS = [
      { runSeconds: 60,   runReps: 6, walkBetweenSeconds: 120 },
      { runSeconds: 90,   runReps: 6, walkBetweenSeconds: 120 },
      { runSeconds: 120,  runReps: 6, walkBetweenSeconds: 120 },
      { runSeconds: 180,  runReps: 5, walkBetweenSeconds: 120 },
      { runSeconds: 240,  runReps: 4, walkBetweenSeconds: 120 },
      { runSeconds: 300,  runReps: 4, walkBetweenSeconds: 120 },
      { runSeconds: 420,  runReps: 3, walkBetweenSeconds: 120 },
      { runSeconds: 540,  runReps: 3, walkBetweenSeconds: 120 },
      { runSeconds: 720,  runReps: 2, walkBetweenSeconds: 120 },
      { runSeconds: 900,  runReps: 2, walkBetweenSeconds: 120 },
      { runSeconds: 1080, runReps: 1, walkBetweenSeconds: 0 },
      { runSeconds: 1320, runReps: 1, walkBetweenSeconds: 0 },
      { runSeconds: 1560, runReps: 1, walkBetweenSeconds: 0 },
      { runSeconds: 1800, runReps: 1, walkBetweenSeconds: 0 },
    ];

    const AQUECIMENTO = 300;
    const DESAQUECIMENTO = 300;
    const SESSOES_POR_SEMANA = 3;

    // ====================================================================
    // 2. FÁBRICA DE INTERVALOS
    // ====================================================================
    function gerarIntervalos(semana) {
      const intervalos = [];
      const totalCaminhadas = (semana.walkBetweenSeconds > 0) ? (semana.runReps - 1) : 0;

      intervalos.push({
        tipo: 'caminhada', fase: 'aquecimento', segundos: AQUECIMENTO,
        rep: 0, repTotal: 0, descricao: 'Aquecimento'
      });

      let caminhadaN = 0;
      for (let i = 0; i < semana.runReps; i++) {
        intervalos.push({
          tipo: 'corrida', fase: 'corrida', segundos: semana.runSeconds,
          rep: i + 1, repTotal: semana.runReps,
          descricao: semana.runReps > 1 ? ('Corra ' + (i + 1) + '/' + semana.runReps) : 'Corra'
        });
        const ehUltimaCorrida = (i === semana.runReps - 1);
        if (!ehUltimaCorrida && semana.walkBetweenSeconds > 0) {
          caminhadaN++;
          intervalos.push({
            tipo: 'caminhada', fase: 'caminhada', segundos: semana.walkBetweenSeconds,
            rep: caminhadaN, repTotal: totalCaminhadas,
            descricao: totalCaminhadas > 1 ? ('Caminhe ' + caminhadaN + '/' + totalCaminhadas) : 'Caminhe'
          });
        }
      }

      intervalos.push({
        tipo: 'caminhada', fase: 'desaquecimento', segundos: DESAQUECIMENTO,
        rep: 0, repTotal: 0, descricao: 'Desaquecimento'
      });
      return intervalos;
    }

    // ====================================================================
    // 3. AJUDANTES DE TEMPO
    // ====================================================================
    function formatarTempo(segundos) {
      const minutos = Math.floor(segundos / 60);
      const resto = segundos % 60;
      if (resto === 0) return minutos + ' min';
      return minutos + ' min ' + resto + 's';
    }
    function formatarRelogio(segundos) {
      const m = Math.floor(segundos / 60);
      const s = segundos % 60;
      return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    // ====================================================================
    // 3.5 SOM E VIBRAÇÃO
    // ====================================================================
    let audioCtx = null;
    function destravarAudio() {
      if (audioCtx === null) {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioCtx();
      }
      if (audioCtx.state === 'suspended') { audioCtx.resume(); }
    }
    function tocarSequencia(notas) {
      if (audioCtx === null) return;
      let inicio = audioCtx.currentTime;
      notas.forEach(function (nota) {
        const osc = audioCtx.createOscillator();
        const ganho = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = nota.freq;
        osc.connect(ganho);
        ganho.connect(audioCtx.destination);
        const dur = nota.dur / 1000;
        const vol = nota.vol || 0.3;
        ganho.gain.setValueAtTime(0.0001, inicio);
        ganho.gain.exponentialRampToValueAtTime(vol, inicio + 0.01);
        ganho.gain.exponentialRampToValueAtTime(0.0001, inicio + dur);
        osc.start(inicio);
        osc.stop(inicio + dur);
        inicio += dur + (nota.gap || 0) / 1000;
      });
    }
    function vibrar(padrao) { if (navigator.vibrate) { navigator.vibrate(padrao); } }
    function alertarCorrida() {
      tocarSequencia([{ freq: 660, dur: 150, gap: 40 }, { freq: 880, dur: 280 }]);
      vibrar([200, 100, 200]);
    }
    function alertarCaminhada() {
      tocarSequencia([{ freq: 440, dur: 150, gap: 40 }, { freq: 330, dur: 280 }]);
      vibrar(400);
    }
    function alertarFim() {
      tocarSequencia([{ freq: 523, dur: 150, gap: 30 }, { freq: 659, dur: 150, gap: 30 }, { freq: 784, dur: 450 }]);
      vibrar([300, 100, 300, 100, 300]);
    }
    function bipContagem() {
      tocarSequencia([{ freq: 520, dur: 90, vol: 0.2 }]);
      vibrar(80);
    }

    // ====================================================================
    // 4. ESTADO DA SESSÃO
    // ====================================================================
    let intervalosSessao = [];
    let indiceIntervaloAtual = 0;
    let segundosRestantes = 0;
    let rodando = false;
    let concluida = false;
    let timerId = null;
    let fimDoIntervalo = 0;
    let totalSegundosSessao = 0;
    let elementosLista = [];
    let ultimoSegundoBip = null;
    let jaIniciou = false;   // controla a exibição do botão Concluir

    const TOTAL_SESSOES = SEMANAS.length * SESSOES_POR_SEMANA;
    const CHAVE_PROGRESSO = 'treinoCorrida.progresso';
    const RAIO = 110;
    const CIRCUNFERENCIA = 2 * Math.PI * RAIO;

    let posicaoAtual = 0;
    let sessoesConcluidas = 0;
    let indiceSemanaAtual = 0;
    let numeroSessaoAtual = 1;

    // ====================================================================
    // 4.5 PROGRESSO SALVO E NAVEGAÇÃO
    // ====================================================================
    function carregarProgresso() {
      try {
        const texto = localStorage.getItem(CHAVE_PROGRESSO);
        if (!texto) return 0;
        const dados = JSON.parse(texto);
        const n = dados.concluidas;
        if (typeof n === 'number' && n >= 0 && n <= TOTAL_SESSOES) return n;
        return 0;
      } catch (e) { return 0; }
    }
    function salvarProgresso(n) {
      try { localStorage.setItem(CHAVE_PROGRESSO, JSON.stringify({ concluidas: n, versao: 1 })); } catch (e) {}
    }
    function aplicarPosicao(posicao) {
      posicaoAtual = Math.max(0, Math.min(posicao, TOTAL_SESSOES - 1));
      indiceSemanaAtual = Math.floor(posicaoAtual / SESSOES_POR_SEMANA);
      numeroSessaoAtual = (posicaoAtual % SESSOES_POR_SEMANA) + 1;
    }
    function atualizarNavegacao() {
      document.getElementById('planoProgresso').textContent =
        sessoesConcluidas + ' de ' + TOTAL_SESSOES + ' concluídas';
      document.getElementById('btnAnterior').disabled = rodando || posicaoAtual === 0;
      document.getElementById('btnProxima').disabled  = rodando || posicaoAtual === TOTAL_SESSOES - 1;
    }
    function irParaSessao(novaPosicao) {
      if (rodando) return;
      aplicarPosicao(novaPosicao);
      prepararSessao();
    }

    // ====================================================================
    // 4.6 PWA: MANIFEST E ÍCONE
    // ====================================================================
    function instalarManifest() {
      const svg =
        '<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512">' +
        '<rect width="512" height="512" rx="96" fill="#eef4f3"/>' +
        '<circle cx="256" cy="256" r="150" fill="none" stroke="#2fbf4f" stroke-width="40"/>' +
        '<text x="256" y="300" font-family="sans-serif" font-size="150" font-weight="bold" ' +
        'fill="#1b1f1d" text-anchor="middle">30</text></svg>';
      const iconeUrl = URL.createObjectURL(new Blob([svg], { type: 'image/svg+xml' }));
      const manifest = {
        name: 'Treino de Corrida', short_name: 'Treino', start_url: '.',
        display: 'standalone', background_color: '#eef4f3', theme_color: '#cce5fb',
        orientation: 'portrait',
        icons: [{ src: iconeUrl, sizes: '512x512', type: 'image/svg+xml', purpose: 'any' }]
      };
      const manifestUrl = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: 'application/json' }));
      const link = document.createElement('link');
      link.rel = 'manifest'; link.href = manifestUrl;
      document.head.appendChild(link);
      const apple = document.createElement('link');
      apple.rel = 'apple-touch-icon'; apple.href = iconeUrl;
      document.head.appendChild(apple);
    }

    // ====================================================================
    // 4.7 WAKE LOCK + RECONCILIAÇÃO AO VOLTAR O FOCO
    // ====================================================================
    let wakeLock = null;
    async function pegarWakeLock() {
      if (!('wakeLock' in navigator)) {
        document.getElementById('avisoTela').textContent = 'Mantenha a tela acesa manualmente (recurso indisponível aqui)';
        return;
      }
      try {
        wakeLock = await navigator.wakeLock.request('screen');
        document.getElementById('avisoTela').textContent = 'Tela travada acesa durante o treino';
        wakeLock.addEventListener('release', function () {
          document.getElementById('avisoTela').textContent = '';
        });
      } catch (e) {
        document.getElementById('avisoTela').textContent = 'Não foi possível travar a tela (precisa de HTTPS)';
      }
    }
    async function soltarWakeLock() {
      if (wakeLock !== null) {
        try { await wakeLock.release(); } catch (e) {}
        wakeLock = null;
      }
      document.getElementById('avisoTela').textContent = '';
    }
    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'visible' && rodando) {
        pegarWakeLock();
        tick();   // reconcilia com o relógio real caso a contagem tenha congelado
      }
    });

    // ====================================================================
    // 5. PREPARAR A SESSÃO
    // ====================================================================
    function prepararSessao() {
      const semana = SEMANAS[indiceSemanaAtual];
      intervalosSessao = gerarIntervalos(semana);
      indiceIntervaloAtual = 0;
      segundosRestantes = intervalosSessao[0].segundos;
      rodando = false;
      concluida = false;
      jaIniciou = false;
      ultimoSegundoBip = null;
      if (timerId !== null) { clearInterval(timerId); timerId = null; }

      totalSegundosSessao = intervalosSessao.reduce(function (soma, b) { return soma + b.segundos; }, 0);

      document.getElementById('tituloSessao').textContent =
        'Semana ' + (indiceSemanaAtual + 1) + ' · Sessão ' + numeroSessaoAtual + ' de ' + SESSOES_POR_SEMANA;

      desenharTrilhoSegmentado();
      renderizarLista();
      atualizarTela();
    }

    function corDaFase(fase) {
      if (fase === 'corrida') return getComputedStyle(document.documentElement).getPropertyValue('--seg-corre');
      if (fase === 'caminhada') return getComputedStyle(document.documentElement).getPropertyValue('--seg-caminha');
      return getComputedStyle(document.documentElement).getPropertyValue('--seg-aquece');
    }
    function desenharTrilhoSegmentado() {
      const g = document.getElementById('ringSegmentos');
      g.innerHTML = '';
      const folga = 4;
      let posicao = 0;
      intervalosSessao.forEach(function (bloco) {
        const comprimento = (bloco.segundos / totalSegundosSessao) * CIRCUNFERENCIA;
        const visivel = Math.max(comprimento - folga, 1);
        const arco = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        arco.setAttribute('class', 'ringSeg');
        arco.setAttribute('cx', '120'); arco.setAttribute('cy', '120'); arco.setAttribute('r', String(RAIO));
        arco.setAttribute('stroke', corDaFase(bloco.fase).trim());
        arco.setAttribute('stroke-dasharray', visivel + ' ' + (CIRCUNFERENCIA - visivel));
        arco.setAttribute('stroke-dashoffset', String(-posicao));
        g.appendChild(arco);
        posicao += comprimento;
      });
    }

    // ====================================================================
    // 6. INICIAR / PAUSAR
    // ====================================================================
    function alternarPlay() {
      destravarAudio();
      if (concluida) return;
      if (rodando) { pausar(); } else { iniciar(); }
    }
    function iniciar() {
      rodando = true;
      jaIniciou = true;
      fimDoIntervalo = Date.now() + segundosRestantes * 1000;
      timerId = setInterval(tick, 250);
      pegarWakeLock();
      atualizarTela();
    }
    function pausar() {
      rodando = false;
      if (timerId !== null) { clearInterval(timerId); timerId = null; }
      soltarWakeLock();
      atualizarTela();
    }

    // ====================================================================
    // 7. O TICK (while consome todos os blocos vencidos de uma vez)
    // ====================================================================
    function tick() {
      if (!rodando) return;
      // enquanto o tempo do bloco atual já venceu, avança para o próximo
      while (rodando && (fimDoIntervalo - Date.now()) <= 0) {
        avancarIntervalo(true);
        if (concluida) return;   // finalizou no avanço
      }
      if (!rodando) return;
      const restanteMs = fimDoIntervalo - Date.now();
      segundosRestantes = Math.max(Math.ceil(restanteMs / 1000), 0);
      if (segundosRestantes <= 3 && segundosRestantes !== ultimoSegundoBip) {
        ultimoSegundoBip = segundosRestantes;
        bipContagem();
      }
      atualizarTela();
    }

    // ====================================================================
    // 8. AVANÇAR / PULAR BLOCO
    // ====================================================================
    function avancarIntervalo(comAlerta) {
      indiceIntervaloAtual++;
      if (indiceIntervaloAtual >= intervalosSessao.length) {
        finalizarSessao();
        return;
      }
      entrarNoBloco(comAlerta);
    }
    function entrarNoBloco(comAlerta) {
      segundosRestantes = intervalosSessao[indiceIntervaloAtual].segundos;
      fimDoIntervalo = Date.now() + segundosRestantes * 1000;
      ultimoSegundoBip = null;
      if (comAlerta) {
        const b = intervalosSessao[indiceIntervaloAtual];
        if (b.tipo === 'corrida') { alertarCorrida(); } else { alertarCaminhada(); }
      }
      atualizarTela();
    }
    function pularBloco(direcao) {
      if (concluida) return;
      const novo = indiceIntervaloAtual + direcao;
      if (novo < 0 || novo >= intervalosSessao.length) return;
      indiceIntervaloAtual = novo;
      entrarNoBloco(true);
    }

    function finalizarSessao() {
      pausar();
      concluida = true;
      indiceIntervaloAtual = intervalosSessao.length - 1;
      if (posicaoAtual + 1 > sessoesConcluidas) {
        sessoesConcluidas = posicaoAtual + 1;
        salvarProgresso(sessoesConcluidas);
      }
      alertarFim();
      atualizarTela();
    }

    // encerrar manualmente pelo botão Concluir
    function concluirManual() {
      if (concluida) return;
      const ok = confirm('Encerrar a sessão agora e marcá-la como concluída?');
      if (!ok) return;
      finalizarSessao();
    }

    // ====================================================================
    // 9. LISTA DE BLOCOS
    // ====================================================================
    function renderizarLista() {
      const lista = document.getElementById('listaIntervalos');
      lista.innerHTML = '';
      elementosLista = [];
      intervalosSessao.forEach(function (intervalo) {
        const li = document.createElement('li');
        li.className = intervalo.tipo;
        li.innerHTML = '<span>' + intervalo.descricao + '</span>' +
          '<span class="tempo">' + formatarTempo(intervalo.segundos) + '</span>';
        lista.appendChild(li);
        elementosLista.push(li);
      });
    }

    // ====================================================================
    // 10. ATUALIZAR A TELA
    // ====================================================================
    function atualizarTela() {
      const bloco = intervalosSessao[indiceIntervaloAtual];
      const acaoTexto = document.getElementById('acaoTexto');
      const acaoCartao = document.getElementById('acaoCartao');

      if (concluida) {
        acaoTexto.textContent = 'Concluída!';
        acaoCartao.className = 'cartao acaoCartao concluida';
      } else {
        acaoTexto.textContent = bloco.descricao;
        acaoCartao.className = 'cartao acaoCartao ' + bloco.tipo;
      }

      document.getElementById('tempoRestante').textContent = formatarRelogio(segundosRestantes);
      document.getElementById('progressoTexto').textContent =
        'Bloco ' + (indiceIntervaloAtual + 1) + ' de ' + intervalosSessao.length;
      document.getElementById('btnIniciar').textContent = rodando ? 'Pausar' : 'Iniciar';

      // botão Concluir aparece quando a sessão já começou e não terminou
      document.getElementById('btnConcluir').style.display =
        (jaIniciou && !concluida) ? 'block' : 'none';

      document.getElementById('btnPularAnt').disabled = concluida || indiceIntervaloAtual === 0;
      document.getElementById('btnPularProx').disabled = concluida || indiceIntervaloAtual === intervalosSessao.length - 1;

      const decorrido = segundosDecorridos();
      const pct = Math.min((decorrido / totalSegundosSessao) * 100, 100);
      document.getElementById('barraPreenchida').style.width = pct + '%';

      const fracao = concluida ? 1 : Math.max(0, Math.min(decorrido / totalSegundosSessao, 1));
      const ring = document.getElementById('ringProg');
      ring.style.strokeDasharray = CIRCUNFERENCIA;
      ring.style.strokeDashoffset = CIRCUNFERENCIA * (1 - fracao);

      const restanteTotal = Math.max(totalSegundosSessao - decorrido, 0);
      document.getElementById('tempoTotalDecorrido').textContent =
        formatarRelogio(decorrido) + ' / ' + formatarRelogio(totalSegundosSessao);
      document.getElementById('tempoTotalRestante').textContent =
        'faltam ' + formatarRelogio(restanteTotal);

      destacarBlocoAtual();
      atualizarNavegacao();
    }

    function segundosDecorridos() {
      let decorrido = 0;
      for (let i = 0; i < indiceIntervaloAtual; i++) { decorrido += intervalosSessao[i].segundos; }
      decorrido += (intervalosSessao[indiceIntervaloAtual].segundos - segundosRestantes);
      return decorrido;
    }
    function destacarBlocoAtual() {
      elementosLista.forEach(function (li, indice) {
        if (indice === indiceIntervaloAtual && !concluida) { li.classList.add('ativo'); }
        else { li.classList.remove('ativo'); }
      });
    }

    // ====================================================================
    // 11. LIGAR OS BOTÕES E ARRANCAR
    // ====================================================================
    instalarManifest();

    document.getElementById('btnIniciar').addEventListener('click', alternarPlay);
    document.getElementById('btnReiniciar').addEventListener('click', prepararSessao);
    document.getElementById('btnConcluir').addEventListener('click', concluirManual);
    document.getElementById('btnPularAnt').addEventListener('click', function () { pularBloco(-1); });
    document.getElementById('btnPularProx').addEventListener('click', function () { pularBloco(1); });
    document.getElementById('btnAnterior').addEventListener('click', function () { irParaSessao(posicaoAtual - 1); });
    document.getElementById('btnProxima').addEventListener('click', function () { irParaSessao(posicaoAtual + 1); });

    document.getElementById('btnZerar').addEventListener('click', function () {
      if (rodando) return;
      const ok = confirm('Zerar todo o progresso e voltar para a Semana 1?');
      if (!ok) return;
      try { localStorage.removeItem(CHAVE_PROGRESSO); } catch (e) {}
      sessoesConcluidas = 0;
      aplicarPosicao(0);
      prepararSessao();
    });

    sessoesConcluidas = carregarProgresso();
    aplicarPosicao(sessoesConcluidas);
    prepararSessao();
  </script>


</body></html>
